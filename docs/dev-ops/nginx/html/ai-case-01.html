<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <!-- 引入 Tailwind CSS 并开启 Typography 插件 -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- 引入 marked.js 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .user-text { white-space: pre-wrap; word-break: break-word; }
        .prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .prose pre { padding: 0.75rem; background-color: #1f2937; color: #f3f4f6; border-radius: 0.5rem; }

        /* 隐藏 details 默认的小三角箭头 */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<!-- body 锁定屏幕高度 (h-screen) 并禁止整体滚动 (overflow-hidden) -->
<body class="bg-gray-50 h-screen flex flex-col font-sans overflow-hidden">

<!-- 顶部导航栏 (shrink-0 保证其高度不被压缩) -->
<header class="bg-white border-b border-gray-200 py-4 px-6 flex items-center justify-between shrink-0 shadow-sm z-10">
    <div class="flex items-center gap-3 max-w-4xl mx-auto w-full">
        <div class="flex items-center gap-3 flex-1">
            <div class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-sm shadow-sm">AI</div>
            <h1 class="text-lg font-semibold text-gray-800">智能助手</h1>
        </div>
        <div class="text-xs text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full border border-gray-200">
            Model: deepseek-r1:1.5b
        </div>
    </div>
</header>

<!-- 主容器：占据剩余空间 (flex-1) 并强制隐藏溢出 (overflow-hidden) -->
<main class="flex-1 flex flex-col w-full max-w-4xl mx-auto overflow-hidden relative">

    <!-- 聊天记录展示区：在主容器内部滚动 (overflow-y-auto) -->
    <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-6 no-scrollbar w-full">
        <div class="w-full space-y-6" id="messageContainer">
            <!-- 欢迎语 -->
            <div class="flex justify-start">
                <div class="bg-white border border-gray-100 text-gray-800 px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[85%] shadow-sm prose prose-sm">
                    <p>你好！我是 AI 助手，有什么可以帮你的吗？</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部输入区 (shrink-0 保证输入框绝对不被压缩) -->
    <footer class="shrink-0 p-4 pb-6 w-full">
        <div class="w-full flex items-end gap-3">
            <div class="flex-1 bg-white rounded-2xl px-4 py-2.5 border border-gray-200 focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all duration-200 shadow-sm">
                <textarea id="messageInput" rows="1" class="w-full bg-transparent outline-none resize-none text-gray-800 py-1" placeholder="输入你想说的话... (Enter 发送，Shift+Enter 换行)"></textarea>
            </div>
            <button id="sendButton" class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-6 py-3.5 font-medium transition-colors duration-200 flex-shrink-0 flex items-center gap-2 disabled:bg-blue-300 disabled:cursor-not-allowed shadow-sm">
                <span>发送</span>
            </button>
        </div>
    </footer>
</main>

<script>
    const BASE_URL = 'http://localhost:8090/api/v1/ollama/generate_stream';
    const MODEL = 'deepseek-r1:1.5b';

    const chatBox = document.getElementById('chatBox');
    const messageContainer = document.getElementById('messageContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    marked.setOptions({ headerIds: false, mangle: false });

    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight < 150 ? this.scrollHeight : 150) + 'px';
    });

    messageInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendButton.addEventListener('click', sendMessage);

    function appendMessage(role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${role === 'USER' ? 'justify-end' : 'justify-start'}`;

        const bubbleDiv = document.createElement('div');
        if (role === 'USER') {
            bubbleDiv.className = 'bg-blue-600 text-white px-5 py-3.5 rounded-2xl rounded-tr-sm max-w-[85%] shadow-sm user-text text-sm';
        } else {
            bubbleDiv.className = 'bg-white border border-gray-100 text-gray-800 px-5 py-3.5 rounded-2xl rounded-tl-sm w-[85%] shadow-sm prose prose-sm prose-blue break-words';
        }

        messageDiv.appendChild(bubbleDiv);
        messageContainer.appendChild(messageDiv);
        scrollToBottom();

        return bubbleDiv;
    }

    function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        messageInput.value = '';
        messageInput.style.height = 'auto';
        messageInput.disabled = true;
        sendButton.disabled = true;
        sendButton.innerText = '生成中...';

        const userBubble = appendMessage('USER');
        userBubble.innerText = text;

        const assistantBubble = appendMessage('ASSISTANT');
        let fullText = '';

        const apiUrl = `${BASE_URL}?model=${encodeURIComponent(MODEL)}&message=${encodeURIComponent(text)}`;
        const eventSource = new EventSource(apiUrl);

        eventSource.onmessage = function(event) {
            try {
                let data = JSON.parse(event.data);
                if (Array.isArray(data) && data.length > 0) data = data[0];

                const content = data?.result?.output?.content || '';
                if (content) {
                    fullText += content;

                    let displayContent = fullText;

                    // 过滤掉空的 think 标签
                    displayContent = displayContent.replace(/<think>\s*<\/think>/g, '');

                    const hasOpenThink = displayContent.includes('<think>') && !displayContent.includes('</think>');

                    const thinkStartHTML = '<details open class="mb-4 group bg-gray-50 border border-gray-200 rounded-xl overflow-hidden shadow-sm"><summary class="cursor-pointer font-bold flex items-center gap-2 text-gray-600 px-4 py-2.5 hover:bg-gray-100 transition-colors select-none"><svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg><span class="text-sm">思考过程</span><svg class="w-4 h-4 ml-auto transform group-open:rotate-180 transition-transform text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></summary><div class="whitespace-pre-wrap text-gray-500 text-sm px-4 py-3 border-t border-gray-200 bg-white">';
                    const thinkEndHTML = '</div></details>';

                    displayContent = displayContent
                        .replace(/<think>/g, thinkStartHTML)
                        .replace(/<\/think>/g, thinkEndHTML);

                    if (hasOpenThink) {
                        displayContent += thinkEndHTML;
                    }

                    assistantBubble.innerHTML = marked.parse(displayContent);
                    scrollToBottom(); // 接收流数据时自动滚动
                }

                const finishReason = data?.result?.metadata?.finishReason;
                if (finishReason === 'STOP') {
                    eventSource.close();
                    resetInput();
                }
            } catch (error) {
                console.error("流式解析出错:", error);
            }
        };

        eventSource.onerror = function(error) {
            eventSource.close();
            if(!fullText) {
                assistantBubble.innerHTML = "<p class='text-red-500'>请求失败，请检查服务是否开启且允许跨域。</p>";
            }
            resetInput();
        };
    }

    function resetInput() {
        messageInput.disabled = false;
        sendButton.disabled = false;
        sendButton.innerText = '发送';
        messageInput.focus();
        scrollToBottom(); // 恢复状态后再滚动一次，确保视口在最底端
    }
</script>
</body>
</html>
